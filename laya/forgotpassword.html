<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ecoscan</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>

    <!-- Tailwind Configuration (using primary color) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4CAF50', // Main green color
                        secondary: '#8BC34A',
                    },
                    borderRadius: {
                        'none': '0px', 'sm': '4px', DEFAULT: '8px', 'md': '12px',
                        'lg': '16px', 'xl': '20px', '2xl': '24px', '3xl': '32px',
                        'full': '9999px', 'button': '8px'
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons (Optional) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
    }
        .font-pacifico { 
            font-family: 'Pacifico', cursive;
     }
    </style>
</head>

<body class="bg-gray-100">

    <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <!-- Logo and Title -->
        <div class="mb-8 flex flex-col items-center">
             <a href="#" class="flex items-center space-x-2 mb-4">
                 <i class="ri-recycle-line ri-2x text-primary"></i>
                 <span class="font-pacifico text-3xl text-primary">ecoscan</span>
             </a>
             <h2 class="text-center text-2xl font-bold text-gray-900">
                Forgot your password?
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                No problem! Enter your email address below and we'll send you instructions to reset it.
            </p>
        </div>

        <!-- Form Card -->
        <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md space-y-6">
            <form class="space-y-6" action="#" method="POST">
                <!-- Note: action="#" and method="POST" are placeholders. Real implementation needs backend endpoint. -->

                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        Email address
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" required
                               class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent !rounded-button shadow-sm text-sm font-medium text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-150 ease-in-out">
                        Send Reset Link
                    </button>
                </div>
            </form>

            <!-- Back to Login Link -->
            <div class="text-sm text-center">
                <a href="login.html" class="font-medium text-primary hover:text-opacity-80">
                    Remembered your password? Sign in
                </a>
            </div>
        </div>
    </div>

</body>
</html>
